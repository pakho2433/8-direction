<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>8 Direction 棋盤任務遊戲</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#bfeeff;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;color:#123b58}
#loading{position:fixed;inset:0;display:grid;place-items:center;background:#bfeeff;z-index:2;text-align:center}
.spin{width:54px;height:54px;border:7px solid rgba(18,59,88,.2);border-top-color:#123b58;border-radius:50%;margin:0 auto 18px;animation:s 1s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
#gameFrame{position:fixed;inset:0;width:100%;height:100%;border:0;background:#bfeeff;display:none}
</style>
</head>
<body>
<div id="loading"><main><div class="spin"></div><h2>8 Direction 遊戲載入中</h2></main></div>
<iframe id="gameFrame" title="8 Direction 棋盤任務遊戲" allow="fullscreen; autoplay"></iframe>
<script>
(async()=>{
  const loading=document.getElementById('loading');
  const frame=document.getElementById('gameFrame');
  try{
    const stamp=Date.now();
    const names=['parts/part01.txt','parts/part02.txt','parts/part03.txt','parts/part04.txt','parts/part05.txt'];
    const parts=await Promise.all(names.map(async n=>{
      const r=await fetch(n+'?v='+stamp,{cache:'no-store'});
      if(!r.ok) throw new Error('無法載入 '+n);
      return r.text();
    }));
    frame.onload=()=>{frame.style.display='block';loading.style.display='none'};
    frame.srcdoc=parts.join('');
    setTimeout(()=>{if(frame.style.display!=='block'){frame.style.display='block';loading.style.display='none'}},5000);
  }catch(e){
    loading.innerHTML='<main><h2>載入失敗</h2><p>請重新整理頁面。</p><p style="font-size:14px">'+String(e.message||e)+'</p></main>';
    console.error(e);
  }
})();
</script>
</body>
</html>
