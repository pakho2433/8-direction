<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>載入遊戲中…</title><style>html,body{margin:0;height:100%;display:grid;place-items:center;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;background:#bfeeff;color:#123b58}main{text-align:center}.spin{width:54px;height:54px;border:7px solid rgba(18,59,88,.2);border-top-color:#123b58;border-radius:50%;margin:0 auto 18px;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}</style></head><body><main><div class="spin"></div><h2>8 Direction 遊戲載入中</h2></main><script>(async()=>{try{const stamp=Date.now();const names=['parts/part01.txt','parts/part02.txt','parts/part03.txt','parts/part04.txt','parts/part05.txt','parts/part06.txt','parts/part07.txt','parts/part08.txt','parts/part09.txt'];const parts=await Promise.all(names.map(n=>fetch(n+'?v='+stamp,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(n);return r.text()})));const html=parts.join('');if(!/^<!doctype html/i.test(html.trim())||!/<\/html>\s*$/i.test(html.trim()))throw new Error('遊戲檔案不完整');document.open();document.write(html);document.close()}catch(e){document.body.innerHTML='<main><h2>載入失敗</h2><p>請重新整理頁面。</p><p>'+String(e.message||e)+'</p></main>';console.error(e)}})();</script></body></html>
