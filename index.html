<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>8 Direction 棋盤任務遊戲</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#bfeeff;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;color:#123b58}
main{position:fixed;inset:0;display:grid;place-items:center;text-align:center;padding:24px}
.spin{width:54px;height:54px;border:7px solid rgba(18,59,88,.2);border-top-color:#123b58;border-radius:50%;margin:0 auto 18px;animation:s 1s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
button{border:0;border-radius:14px;padding:12px 18px;background:#fff;color:#123b58;font-weight:900;font-size:16px;box-shadow:0 6px 0 #80bed6}
</style>
</head>
<body>
<main id="loading"><div><div class="spin"></div><h2>8 Direction 遊戲載入中</h2><p>正在準備完整遊戲畫面⋯</p></div></main>
<script>
(async()=>{
  const loading=document.getElementById('loading');
  try{
    const stamp=Date.now();
    const names=['parts/part01.txt','parts/part02.txt','parts/part03.txt','parts/part04.txt','parts/part05.txt'];
    const chunks=await Promise.all(names.map(async(name,index)=>{
      const response=await fetch(name+'?v='+stamp,{cache:'no-store'});
      if(!response.ok)throw new Error('無法載入 '+name);
      let text=await response.text();
      text=text.replace(/^\uFEFF/,'');
      if(index>0)text=text.replace(/^\s+/, '');
      if(index<names.length-1)text=text.replace(/\s+$/, '');
      return text;
    }));
    const html=chunks.join('');
    if(!/^<!doctype html/i.test(html.trim())||!/<\/html>\s*$/i.test(html.trim()))throw new Error('遊戲檔案不完整');
    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    const gameUrl=URL.createObjectURL(blob);
    window.location.replace(gameUrl);
  }catch(error){
    console.error(error);
    loading.innerHTML='<div><h2>載入失敗</h2><p>'+String(error.message||error)+'</p><button onclick="location.reload()">重新載入</button></div>';
  }
})();
</script>
</body>
</html>
