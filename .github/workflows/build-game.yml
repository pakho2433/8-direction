name: Build direct game page

on:
  push:
    branches: [main]
    paths:
      - "parts/**"
      - ".github/workflows/build-game.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble the game into index.html
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          files = sorted(Path("parts").glob("part*.txt"))
          if not files:
              raise SystemExit("No game parts found")

          chunks = []
          for file in files:
              text = file.read_text(encoding="utf-8").replace("\ufeff", "")
              chunks.append(text.strip())

          game = "".join(chunks)
          if not game.lstrip().lower().startswith("<!doctype html"):
              raise SystemExit("Assembled file does not begin with HTML")
          if "</html>" not in game.lower():
              raise SystemExit("Assembled file is incomplete")

          Path("index.html").write_text(game, encoding="utf-8")
          Path(".nojekyll").touch()
          print("Assembled", len(files), "parts into", len(game), "characters")
          PY

      - name: Commit the direct game page
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .nojekyll
          if git diff --cached --quiet; then
            echo "No changes required"
          else
            git commit -m "Publish game as a direct HTML page [skip ci]"
            git push
          fi
