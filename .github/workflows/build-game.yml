name: Build direct game page

on:
  push:
    branches: [main]
    paths:
      - "parts/**"
      - ".github/workflows/build-game.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble and repair the valid five game parts
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          files = [Path(f"parts/part{i:02d}.txt") for i in range(1, 6)]
          missing = [str(file) for file in files if not file.exists()]
          if missing:
              raise SystemExit("Missing game parts: " + ", ".join(missing))

          chunks = [file.read_text(encoding="utf-8").replace("\ufeff", "").strip() for file in files]

          # The first uploaded part contains one accidental quote at its final split point.
          # Removing it joins the compressed CSS string correctly with part 02.
          if chunks[0].endswith('"') and chunks[1] and chunks[1][0].isalnum():
              chunks[0] = chunks[0][:-1]
              print("Removed the accidental quote at the part01/part02 boundary")

          game = "".join(chunks)
          if not game.lstrip().lower().startswith("<!doctype html"):
              raise SystemExit("Assembled file does not begin with HTML")
          if not game.rstrip().lower().endswith("</html>"):
              raise SystemExit("Assembled five-part game is incomplete")

          Path("index.html").write_text(game, encoding="utf-8")
          Path(".nojekyll").touch()
          print("Published repaired five-part game as index.html:", len(game), "characters")
          PY

      - name: Commit the direct game page
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .nojekyll
          if git diff --cached --quiet; then
            echo "No changes required"
          else
            git commit -m "Repair and publish the direct game page [skip ci]"
            git push
          fi
